{% extends 'layout.html' %}
{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row g-5">
      <div class="col-lg-5">
        <div class="section-overline">Contact</div>
        <h3 class="mt-2">Get in touch</h3>
        <p class="text-muted">Questions about the models, dataset, or deployment? Reach out and we'll respond within 48 hours.</p>

        <div class="mt-4">
          {% for c in contacts %}
          <div class="floating-card p-3 mb-3">
            <div class="fw-semibold">{{ c.title }}</div>
            <div class="text-muted small">{{ c.name }}</div>
            <a href="mailto:{{ c.email }}" class="d-block small">{{ c.email }}</a>
            <div class="text-muted small">{{ c.phone }}</div>
          </div>
          {% endfor %}
        </div>
      </div>
      <div class="col-lg-7">
        <div class="floating-card p-4">
          <form method="post" class="needs-validation" novalidate>
            <div class="row g-3">
              <div class="col-md-6 form-floating">
                <input class="form-control" id="name" name="name" placeholder="Name" required>
                <label for="name">Name</label>
              </div>
              <div class="col-md-6 form-floating">
                <input class="form-control" id="email" name="email" placeholder="Email" required>
                <label for="email">Email</label>
              </div>
              <div class="col-12 form-floating">
                <textarea class="form-control" id="message" name="message" placeholder="Message" style="height:140px" required></textarea>
                <label for="message">Message</label>
              </div>
            </div>
            <div class="mt-3 text-end">
              <button class="btn btn-cta">Send message</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
